<!doctype html>

    <!-- Immediate dark fallback background for html/body - prevents white flash.
         Once CSS variables are available, we switch to the themed background. -->
    <style>
      html,body{background:#0a1628;background:hsl(var(--background))}
    </style>
    <!-- BLOCKING pre-paint theme initializer.
         Must run before CSS/React so the correct .dark class is on <html> before first paint.
         - Runs one-time migration from legacy "light"/"system" -> "dark".
         - Forces dark on /demo (without persisting, so user prefs elsewhere are preserved).
         - Reads next-themes' default "theme" key from localStorage. -->
    <script>
      (function () {
        try {
          var MIGRATION_KEY = 'zs-theme-default-v2';
          var STORAGE_KEY = 'theme'; // next-themes default
          var ls = window.localStorage;

          // One-time migration: anyone on light/system/unset becomes dark by default.
          if (!ls.getItem(MIGRATION_KEY)) {
            var prior = ls.getItem(STORAGE_KEY);
            if (!prior || prior === 'light' || prior === 'system') {
              ls.setItem(STORAGE_KEY, 'dark');
            }
            ls.setItem(MIGRATION_KEY, '1');
          }

          var path = window.location.pathname || '';
          var isDemo = path === '/demo' || path.indexOf('/demo/') === 0;

          var stored = ls.getItem(STORAGE_KEY);
          // Default is dark unless the user explicitly chose light.
          var theme = isDemo ? 'dark' : (stored === 'light' ? 'light' : 'dark');

          var root = document.documentElement;
          root.classList.remove('light', 'dark');
          root.classList.add(theme);
          root.style.colorScheme = theme;
        } catch (e) {
          // Fail safe -> dark
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <!-- Google tag (gtag.js) - deferred to avoid blocking FCP/LCP -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-H0G72NVJHY');
      // Defer loading the gtag script until after page load
      window.addEventListener('load', function() {
        var s = document.createElement('script');
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-H0G72NVJHY';
        s.async = true;
        document.head.appendChild(s);
      });
    </script>

    <script>
      (function () {
        var hostname = window.location.hostname;
        var isPreviewHost = hostname.includes('id-preview--') || hostname.endsWith('.lovableproject.com');
        var isInIframe = false;

        try {
          isInIframe = window.self !== window.top;
        } catch (e) {
          isInIframe = true;
        }

        if (!isPreviewHost && !isInIframe) {
          document.write('<link rel="manifest" href="/manifest.webmanifest" />');
        }
      })();
    </script>
    <script>
      (function () {
        var BOOT_RECOVERY_KEY = 'zensolar_boot_recovery';

        function isRecoverableBootError(message) {
          return (
            message.indexOf('Importing a module script failed') !== -1 ||
            message.indexOf('Failed to fetch dynamically imported module') !== -1 ||
            message.indexOf('Loading chunk') !== -1 ||
            message.indexOf('Loading CSS chunk') !== -1
          );
        }

        window.__zensolarBooted = false;
        window.__zensolarRecoverBoot = function () {
          try {
            var lastAttempt = Number(sessionStorage.getItem(BOOT_RECOVERY_KEY) || 0);
            var now = Date.now();
            if (now - lastAttempt < 30000) return;

            sessionStorage.setItem(BOOT_RECOVERY_KEY, String(now));
            var url = new URL(window.location.href);
            url.searchParams.set('boot-recover', String(now));
            window.location.replace(url.toString());
          } catch (error) {
            window.location.reload();
          }
        };

        window.addEventListener('error', function (event) {
          var message = String((event && event.message) || '');
          if (isRecoverableBootError(message)) {
            window.__zensolarRecoverBoot();
          }
        }, true);

        window.addEventListener('unhandledrejection', function (event) {
          var reason = event && event.reason;
          var message = String((reason && reason.message) || reason || '');
          if (isRecoverableBootError(message)) {
            window.__zensolarRecoverBoot();
          }
        });

        window.setTimeout(function () {
          if (!window.__zensolarBooted && document.getElementById('pwa-splash')) {
            window.__zensolarRecoverBoot();
          }
        }, 8000);
      })();
    </script>

    <!-- Prevent any initial white flash before CSS/React are ready -->
    <!-- CRITICAL: Full viewport coverage for iOS PWA to avoid white bar at bottom -->

      html,

        width: 100%;
        height: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        padding: 0;
        /* Solid background color that extends into safe areas */

        background: hsl(var(--background));

        min-height: 100dvh;

  <body>
    <!-- Inline splash: shows instantly before any JS loads. React removes it on mount. -->
    <style>
      #pwa-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #0a1628;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        transition: opacity 0.3s ease;
      }
      #pwa-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #pwa-splash img {
        width: 160px;
        height: auto;
      }
      #pwa-splash-bar-track {
        width: 120px;
        height: 3px;
        background: rgba(255,255,255,0.12);
        border-radius: 99px;
        overflow: hidden;
      }
      #pwa-splash-bar {
        height: 100%;
        width: 0%;
        background: #22c55e;
        border-radius: 99px;
        animation: splashProgress 2.5s cubic-bezier(0.4,0,0.2,1) forwards;
      }
      @keyframes splashProgress {
        0%   { width: 0%; }
        60%  { width: 75%; }
        90%  { width: 90%; }
        100% { width: 95%; }
      }
    </style>

    <div id="pwa-splash" role="status" aria-label="Loading ZenSolar">
      <img src="/logos/zen-logo-horizontal-new.png" alt="ZenSolar" />
      <div id="pwa-splash-bar-track">
        <div id="pwa-splash-bar"></div>
      </div>
    </div>

    <script>
      window.hideSplashScreen = function() {
        var el = document.getElementById('pwa-splash');
        if (!el) return;
        // Complete the progress bar first, then fade
        var bar = document.getElementById('pwa-splash-bar');
        if (bar) bar.style.cssText = 'width:100%;transition:width 0.2s ease';
        setTimeout(function() {
          el.classList.add('fade-out');
          setTimeout(function() { el.remove(); }, 320);
        }, 200);
      };
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
